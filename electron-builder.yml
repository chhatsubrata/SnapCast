appId: com.snapcast.app
productName: SnapCast
copyright: Copyright © 2026
directories:
  buildResources: build
  output: release/${version}
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron/*'
  - '!{.eslintrc.cjs,.prettierrc,.prettierignore}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{electron.vite.config.ts,electron-builder.yml,postcss.config.js}'
  - '!{README.md,*.md}'
asar: true
asarUnpack:
  - resources/**
win:
  executableName: snapcast
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
linux:
  # Directory of standard-size PNGs (16..512) so the deb/AppImage install a full
  # hicolor icon set. A single icon.png yields only one size and Linux menus can
  # show a blank icon. Sizes generated by scripts/generate-icons.mjs.
  icon: build/icons
  target:
    - AppImage
    - deb
  maintainer: your-email@example.com
  category: Utility
deb:
  depends:
    - libnotify4
    - libnss3
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [x64, arm64]
  hardenedRuntime: true
publish: null
